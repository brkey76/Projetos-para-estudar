<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Conversor de Moedas</title>
</head>

<body>
    <nav>
        <img id="logo" src="./Assets/Logo.png" alt="Logo">
    </nav>
    <div class="container">
        <main>
            <div class="display up">
                <h2 class="text">Conversor de </h1>
                    <select class="backgroundSelectInput " id="fromCurrency">
                        <option value="BRL">R$ Real Brasileiro</option>
                        <option value="USD">US$ Dólar Americano</option>
                        <option value="EUR">€ Euro</option>
                        <option value="THB">฿ Bahts Tailandeses</option>
                    </select>
            </div>
            <div class="display">
                <h2 class="text" for="toCurrency">Para:</h2>
                <select class="backgroundSelectInput" id="toCurrency">
                    <option value="USD">US$ Dólar Americano</option>
                    <option value="EUR">€ Euro</option>
                    <option value="BRL">R$ Real Brasileiro</option>
                    <option value="THB">฿ Bahts Tailandeses</option>
                </select>
            </div>
            <div class="display">
                <h2 class="text amount" for="amount">Valor:</h2>
                <input class="backgroundSelectInput " type="number" id="amount" placeholder="Digite o valor">
            </div>
            <button onclick="Converter()">Converter</button>
            <div class="moedasValores">
                <img id="image-moeda-coverter" src="./Assets/BRL.png" alt="Moeda Converter">
                <p id="Moeda-Converter">Real</p>
                <p id="Valor-converter">R$ 0,00</p>
                <img id="Arrow" src="./Assets/Vector.png" alt="seta">
                <img id="imagem-moeda-convertida" src="./Assets/USD.png" alt="Moeda Convertida">
                <p id="Moeda-convertida">Dolar</p>
                <p id="valor-convertido">US$ 0,00</p>

            </div>
        </main>
    </div>
</body>
<script src="scripts.js"></script>

</html>
